<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor El Papelito - Rotary Club Arica</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/papelito.css">
</head>
<body class="viewer-body">

    <!-- Sidebar Histórico -->
    <aside class="papelito-sidebar" id="sidebar">
        <div class="papelito-sidebar-header">
            <h5 class="mb-0"><i class="bi bi-journal-text me-2"></i>El Papelito</h5>
            <a href="index.html" class="btn btn-sm btn-outline-light" aria-label="Volver a Inicio" title="Volver a Inicio"><i class="bi bi-house"></i></a>
        </div>
        <div class="papelito-sidebar-content" id="documentList">
            <div class="text-center mt-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Viewer -->
    <main class="papelito-main">
        <!-- Toolbar -->
        <div class="papelito-toolbar">
            <div class="toolbar-group">
                <button id="toggleSidebar" class="btn" title="Ocultar/Mostrar Histórico"><i class="bi bi-list"></i></button>
                <span class="ms-3 fw-bold d-none d-md-inline" id="currentDocumentTitle">Seleccione un documento</span>
            </div>
            
            <div class="toolbar-group">
                <button class="btn btn-outline-secondary btn-sm" id="prevPage" title="Página Anterior" disabled>
                    <i class="bi bi-chevron-left"></i>
                </button>
                <span class="small px-2">Pag <span id="pageNum">0</span> / <span id="pageCount">0</span></span>
                <button class="btn btn-outline-secondary btn-sm" id="nextPage" title="Página Siguiente" disabled>
                    <i class="bi bi-chevron-right"></i>
                </button>
            </div>
            
            <div class="toolbar-group">
                <button class="btn btn-outline-secondary btn-sm" id="zoomOut" title="Reducir Zoom"><i class="bi bi-zoom-out"></i></button>
                <button class="btn btn-outline-secondary btn-sm" id="zoomIn" title="Aumentar Zoom"><i class="bi bi-zoom-in"></i></button>
            </div>
        </div>

        <!-- Canvas Container -->
        <div class="papelito-canvas-container" id="canvasContainer">
            <div class="loading-indicator" id="loadingIndicator">
                <div class="spinner-border text-light" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Cargando PDF...</span>
                </div>
            </div>
            <canvas id="pdf-render"></canvas>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Logic -->
    <script src="js/papelito.js"></script>
</body>
</html>
