<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir una Edición - Rotary Club Arica</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Open Sans', sans-serif;
            font-size: 20px; /* Tamaño de fuente base grande */
            background-color: #f4f6f9;
        }
        h2 { font-size: 2.5rem; font-weight: 700; color: #17458f; }
        .form-label { font-size: 1.25rem; font-weight: 600; color: #333; }
        .form-control-lg {
            font-size: 1.2rem;
            padding: 15px;
            border: 2px solid #ccc;
            border-radius: 8px;
        }
        .form-control-lg:focus { border-color: #17458f; box-shadow: 0 0 0 4px rgba(23, 69, 143, 0.25); }
        .btn-giant {
            min-height: 80px;
            font-size: 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease-in-out;
            background-color: #f7a81b; /* Oro Rotary */
            border: none;
            color: #1a1a2e;
        }
        .btn-giant:hover {
            transform: scale(1.02);
            background-color: #d48e0f;
            color: #fff;
        }
        .btn-giant:disabled {
            background-color: #ccc;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }
        .card-custom {
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            border: none;
        }
        .alert-giant {
            font-size: 1.4rem;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container py-5 max-w-700" style="max-width: 800px; margin: 0 auto;">
        
        <div class="text-center mb-5">
            <h2 class="mb-3"><i class="bi bi-file-earmark-arrow-up-fill me-3"></i>Subir Documento "El Papelito"</h2>
            <p class="text-muted fs-4">Complete este formulario para publicar la revista para todos los lectores.</p>
        </div>

        <div class="card card-custom">
            <div class="card-body p-4 p-md-5">
                
                <!-- Mensajes de Estado Visuales -->
                <div id="alertSuccess" class="alert alert-success alert-giant text-center shadow-sm" role="alert">
                    <i class="bi bi-check-circle-fill me-2 fs-2 d-block mb-2"></i>
                    <strong>¡Archivo guardado con éxito!</strong><br>
                    Los lectores ya pueden ver esta edición.
                </div>

                <div id="alertError" class="alert alert-danger alert-giant text-center shadow-sm" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span id="errorMessage">Hubo un problema. Intente nuevamente.</span>
                </div>

                <form id="uploadForm">
                    <div class="mb-4">
                        <label class="form-label" for="formTitulo">1. ¿Qué nombre tiene la edición?</label>
                        <input type="text" class="form-control form-control-lg" id="formTitulo" placeholder="Ejemplo: Edición N°15 - Agosto" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label" for="formFecha">2. Seleccione la fecha de publicación</label>
                        <input type="date" class="form-control form-control-lg" id="formFecha" required>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label" for="formPdf">3. Seleccione el archivo PDF de su computadora</label>
                        <input type="file" class="form-control form-control-lg" id="formPdf" accept=".pdf" required>
                        <div class="form-text fs-5 text-muted mt-2"><i class="bi bi-info-circle me-1"></i>Asegúrese de elegir el archivo correcto antes de continuar.</div>
                    </div>

                    <button type="submit" id="btnSubmit" class="btn btn-giant w-100 mt-2">
                        <i class="bi bi-cloud-arrow-up-fill me-3 fs-1"></i> Publicar Documento
                    </button>
                    
                    <div class="text-center mt-4">
                        <a href="papelito.html" class="btn btn-outline-secondary btn-lg py-3 px-4 fw-bold" style="font-size: 1.2rem; border-radius: 10px;">
                            <i class="bi bi-eye"></i> Ver listado como público
                        </a>
                    </div>
                </form>
            </div>
        </div>
        
    </div>

    <!-- Logic -->
    <script src="js/papelito-admin.js"></script>
</body>
</html>
